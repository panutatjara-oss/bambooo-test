<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เว็บไซต์ส่วนตัวของฉัน</title>
    <style>
        /* ส่วนของ CSS เพื่อตกแต่งหน้าตา */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Profile Picture">
        
        <h1>ยินดีต้อนรับสู่เว็บของฉัน</h1>
        <p>นี่คือตัวอย่างเว็บไซต์ที่สร้างด้วย HTML และ CSS แบบง่ายๆ คุณสามารถนำไปปรับแต่งสีสันหรือข้อความได้ตามใจชอบเลย!</p>
        
        <a href="https://www.google.com" class="btn">ไปที่ Google</a>
    </div>

</body>
</html>
